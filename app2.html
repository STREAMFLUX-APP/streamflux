function ChipSelect({ label, hint, options, selected, onToggle, single = false }) {

<div style={{ marginBottom: 22 }}>

{options.map(opt => {
const val = typeof opt === "string" ? opt : opt.value;
const lbl = typeof opt === "string" ? opt : opt.label;
const sub = typeof opt === "object" ? opt.desc : null;
const active = single ? selected === val : selected.includes(val);
return (
<button key={val} onClick={() => onToggle(val)} style={{
background: active ? "#1a2a1a" : "#0d1017", border: `1px solid ${active ? G.green : G.border}`,
borderRadius: 7, color: active ? "#6ee7a0" : "#9ca3af", fontSize: 12,
padding: sub ? "9px 13px" : "7px 12px", cursor: "pointer", fontFamily: "inherit", textAlign: "left",
}}>
<div style={{ fontWeight: active ? 700 : 400 }}>{lbl}</div>
{sub && <div style={{ fontSize: 11, color: active ? "#4ade80" : G.muted, marginTop: 2 }}>{sub}</div>}
</button>
);
})}
</div>
</div>

}

const callClaude = async (apiKey, prompt, maxTokens = 1300) => {
const res = await fetch("https://api.anthropic.com/v1/messages", {
method: "POST",
headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: maxTokens, messages: [{ role: "user", content: prompt }] }),
});
if (!res.ok) { const e = await res.json(); throw new Error(e?.error?.message || `API error ${res.status}`); }
const data = await res.json();
if (data.error) throw new Error(data.error.message);
const text = data.content.map(i => i.type === "text" ? i.text : "").join("").trim();
try { return JSON.parse(text); } catch {}
const cm = text.match(/```(?:json)?\s*([\s\S]*?)```/);
if (cm) { try { return JSON.parse(cm[1].trim()); } catch {} }
const jm = text.match(/\{[\s\S]*\}/);
if (jm) { try { return JSON.parse(jm[0]); } catch {} }
throw new Error("Could not read AI response — please try again.");
};

{error && <p style={{ color: "#f87171", fontSize: 12, marginTop: 10, fontFamily: "monospace" }}>⚠ {error}</p>}
</div>
<p style={{ textAlign: "center", color: G.muted, fontSize: 12, marginTop: 16 }}>
<a href="/" style={{ color: G.muted }}>← Back to Streamflux</a>
</p>
</div>
</div>
);

// RESULTS SCREEN
if (result) return (
<div style={s}>
<div style={{ borderBottom: `1px solid ${G.border}`, padding: "16px 22px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
<span style={{ fontSize: 16, fontWeight: 700 }}>🤝 Outreach Package for {clientName} — {language}</span>
<button onClick={() => { setResult(null); setError(""); }} style={{ ...btnS, padding: "7px 14px", fontSize: 12 }}>← New Client</button>
</div>
<div style={{ maxWidth: 720, margin: "0 auto", padding: "24px 18px 60px" }}>
{result.best_match_analysis && (
<div style={{ background: "#0d1f0d", border: `1px solid ${G.green}`, borderRadius: 10, padding: "16px 18px", marginBottom: 20 }}>
<p style={{ fontSize: 11, fontWeight: 700, color: "#4ade80", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>🏆 AI Property Match Analysis</p>
<p style={{ color: "#d1fae5", fontSize: 14, lineHeight: 1.7 }}>{result.best_match_analysis}</p>
</div>
)}
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 20px" }}>Every message personalised for {clientName}. Tap Copy and send.</p>
<div style={{ display: "flex", gap: 7, marginBottom: 22, flexWrap: "wrap" }}>
{TABS.map(tab => (
<button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
background: activeTab === tab.id ? G.blue : "#0d1017", color: activeTab === tab.id ? "#fff" : G.muted,
border: `1px solid ${activeTab === tab.id ? G.blue : G.border}`, borderRadius: 8, padding: "8px 14px",
fontSize: 12, fontWeight: activeTab === tab.id ? 700 : 400, fontFamily: "inherit", cursor: "pointer",
}}>{tab.label}</button>
))}
</div>
{activeTab === "messages" && <>
<OutputCard title="WhatsApp Message" icon="💬" badge="WhatsApp" content={result.whatsapp} />
<OutputCard title="SMS Message" icon="📱" badge="160 chars" content={result.sms} />
</>}
{activeTab === "voice" && <>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 14px" }}>Read naturally — don't sound like you're reading a script.</p>
<OutputCard title="Phone Call Script" icon="🎙️" content={result.voice_script} />
</>}
{activeTab === "email" && <>
<OutputCard title="Email Subject Line" icon="📧" content={result.email_subject} />
<OutputCard title="Email Body" icon="📨" content={result.email_body} />
</>}
{activeTab === "letter" && <>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 14px" }}>Replace anything in brackets before printing and sending.</p>
<OutputCard title="Formal Letter" icon="✉️" content={result.formal_letter} />
</>}
{activeTab === "followups" && <>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 14px" }}>Send in order if no reply. Works on WhatsApp and SMS.</p>
<OutputCard title="Follow-Up #1" icon="💬" badge="Day 3" content={result.followup_1} />
<OutputCard title="Follow-Up #2" icon="💬" badge="Week 1" content={result.followup_2} />
<OutputCard title="Follow-Up #3" icon="💬" badge="Week 2" content={result.followup_3} />
<OutputCard title="Follow-Up #4" icon="💬" badge="Month 1" content={result.followup_4} />
</>}
{activeTab === "schedule" && <>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 18px" }}>Your exact follow-up plan for {clientName}. Follow this and never miss a touch point again.</p>
{result.schedule && result.schedule.map((day, i) => (
<div key={i} style={{ background: "#0d1017", border: `1px solid ${G.border}`, borderRadius: 10, padding: "16px 18px", marginBottom: 14 }}>
<div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
<span style={{ fontSize: 22 }}>{day.icon}</span>
<span style={{ fontSize: 14, fontWeight: 700, color: G.blue }}>{day.day}</span>
</div>
<div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
{day.tasks && day.tasks.map((task, j) => (
<div key={j} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
<span style={{ color: G.blue, fontWeight: 700, flexShrink: 0, fontSize: 14 }}>→</span>
<span style={{ fontSize: 14, color: "#d1d5db", lineHeight: 1.6 }}>{task}</span>
</div>
))}
</div>
</div>
))}
</>}
</div>
</div>
);

// FORM SCREEN
return (
<div style={s}>
<div style={{ borderBottom: `1px solid ${G.border}`, padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
<span style={{ fontSize: 16, fontWeight: 700 }}>🤝 Client Outreach Machine</span>
<span style={{ fontSize: 11, color: G.muted }}>{language}</span>
</div>
<div style={{ maxWidth: 660, margin: "0 auto", padding: "30px 20px 60px" }}>

{/* CLIENT INFO */}
<div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>👤 Who Are You Contacting?</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 20px" }}>The more detail, the more personalised the messages.</p>
<Field label="Client First Name" value={clientName} onChange={setClientName} placeholder="Sarah" />
<ChipSelect label="Client Type" options={CLIENT_TYPES} selected={clientType} onToggle={setClientType} single />
<ChipSelect label="Reason for Contacting" hint="Why are you reaching out right now?" options={CONTACT_REASONS} selected={contactReason} onToggle={setContactReason} single />
<ChipSelect label="Urgency Level" options={URGENCY} selected={urgency} onToggle={setUrgency} single />
<ChipSelect label="Communication Tone" hint="How should the messages feel?" options={TONES} selected={tone} onToggle={setTone} single />
</div>

{/* OBJECTION HANDLER */}
{isObjection && (
<div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>🛡️ What Objection Did They Raise?</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 20px" }}>Select the objection so the AI can handle it perfectly.</p>
<ChipSelect label="Their Objection" options={OBJECTIONS} selected={objection} onToggle={setObjection} single />
</div>
)}

{/* ANNIVERSARY */}
{isAnniversary && (
<div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>🎉 Home Anniversary Details</h2>
<Field label="Years Since Purchase" value={anniversaryYears} onChange={setAnniversaryYears} placeholder="1" type="number" />
</div>
)}

{/* PROPERTY */}
<div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>🏠 Property You're Offering</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 20px" }}>Leave blank for general outreach with no specific property.</p>
<Field label="Property Address" value={propAddress} onChange={setPropAddress} placeholder="42 Palm Drive, Miami Beach, FL 33139" />
<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
<Field label="Asking Price ($)" value={propPrice} onChange={setPropPrice} placeholder="1,100,000" />
<Field label="Property Type" value={propType} onChange={setPropType} placeholder="4-bed villa with pool" />
</div>
<Field label="Key Highlights" hint="Top 2-3 things that make this property perfect for this client" value={propHighlights} onChange={setPropHighlights} placeholder="Ocean views, private pool, just reduced by $50K" rows={2} />
</div>

{/* PROPERTY MATCHER */}
{isMatcher && (
<div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>🏆 Property Preference Matcher</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 20px" }}>Enter up to 3 properties. The AI will analyse which best matches this buyer and pitch it perfectly.</p>
<Field label="Buyer's Needs & Preferences" hint="Summarise what this buyer is looking for" value={buyerNeeds} onChange={setBuyerNeeds} placeholder="Wants 4 beds, pool, good schools, under $1.5M, prefers South Beach area" rows={2} />
{matcherProps.map((p, i) => (
<div key={i} style={{ background: "#0d1017", border: `1px solid ${G.border}`, borderRadius: 10, padding: "16px", marginBottom: 12 }}>
<p style={{ fontSize: 11, fontWeight: 700, color: G.gold, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12 }}>Option {i + 1}</p>
<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
<Field label="Address" value={p.address} onChange={v => updateMatcherProp(i, "address", v)} placeholder="123 Main St, Miami" />
<Field label="Price ($)" value={p.price} onChange={v => updateMatcherProp(i, "price", v)} placeholder="1,200,000" />
</div>
<Field label="Property Type" value={p.type} onChange={v => updateMatcherProp(i, "type", v)} placeholder="4-bed house with pool" />
<Field label="Key Highlights" value={p.highlights} onChange={v => updateMatcherProp(i, "highlights", v)} placeholder="Ocean view, renovated kitchen, top-rated school district" />
</div>
))}
</div>
)}

{/* BUYER CRITERIA */}
{isBuyer && !isMatcher && (
<div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>🔍 Buyer Criteria</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 20px" }}>What is this buyer looking for?</p>
<ChipSelect label="Their Requirements" options={BUYER_CRITERIA} selected={buyerCriteria} onToggle={(v) => setBuyerCriteria(prev => prev.includes(v) ? prev.filter(x => x !== v) : [...prev, v])} />
</div>
)}

{/* SELLER SITUATION */}
{isSeller && (
<div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>🏷️ Seller Situation</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 20px" }}>What's their situation?</p>
<ChipSelect label="Their Situation" options={SELLER_SITUATION} selected={sellerSituation} onToggle={(v) => setSellerSituation(prev => prev.includes(v) ? prev.filter(x => x !== v) : [...prev, v])} />
</div>
)}

{/* PERSONAL CONTEXT */}
<div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>💡 Personal Context</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 20px" }}>Personal details make messages feel human and real.</p>
<Field label="Prior Contact History" hint="Have you spoken before? What did they say?" value={priorContact} onChange={setPriorContact} placeholder="Met at open house 2 weeks ago. Said they loved the area but wanted more bedrooms." rows={2} />
<Field label="Personal Note" hint="Kids, job, lifestyle — anything personal" value={personalNote} onChange={setPersonalNote} placeholder="Has 2 young kids, works from home, loves outdoor entertaining, moving from NYC" rows={2} />
</div>

{/* AGENT */}
<div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>🏷️ Your Details</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 20px" }}>Used in sign-offs, letters and the voice script.</p>
<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
<Field label="Your Name" value={agentName} onChange={setAgentName} placeholder="James Rivera" />
<Field label="Your Phone" value={agentPhone} onChange={setAgentPhone} placeholder="+1 305 555 0199" />
</div>
<Field label="Agency / Company Name" value={agencyName} onChange={setAgencyName} placeholder="Rivera Real Estate Group" />
</div>

{error && <div style={{ background: "#1a0a0a", border: "1px solid #3a1a1a", borderRadius: 8, padding: "12px 16px", color: "#f87171", fontSize: 13, marginBottom: 16, fontFamily: "monospace" }}>⚠ {error}</div>}

{loading && <div style={{ background: "#13161b", border: `1px solid ${G.border}`, borderRadius: 10, padding: "18px 22px", marginBottom: 16, textAlign: "center" }}>
<p style={{ color: G.blue, fontSize: 14, margin: 0, fontWeight: 600 }}>{loadingMsg}</p>
<p style={{ color: G.muted, fontSize: 12, margin: "6px 0 0" }}>Generating in {language}. Takes about 20 seconds. Please wait...</p>
</div>}

<button onClick={() => canGenerate && !loading && generate()} disabled={loading || !canGenerate} style={{ ...btnP(!canGenerate || loading), width: "100%", fontSize: 15 }}>
{loading ? "Generating..." : "✦ Generate Full Outreach Package"}
</button>
{!canGenerate && <p style={{ color: G.muted, fontSize: 12, marginTop: 8, textAlign: "center" }}>Fill in client name, type, contact reason, tone and your name to continue.</p>}
</div>
</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
